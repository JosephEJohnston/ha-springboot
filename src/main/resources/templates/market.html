<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自选看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <style>
        /* 让 HTMX 的局部刷新自带 0.2s 的淡入淡出效果，消除闪烁感 */
        ::view-transition-group(root) {
            animation-duration: 0.2s;
        }
        /* 强制让数字使用等宽字体，防止 3.511 变成 3.588 时产生抖动 */
        .font-mono-numbers {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">

    <div class="px-6 py-5 bg-slate-800 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
            <span class="text-2xl">📈</span>
            <h1 class="text-lg font-bold tracking-tight">核心宽基自选池</h1>
        </div>

        <div x-data="{ loading: false }">
            <button
                    hx-get="/market"
                    hx-target="#market-data-container"
                    hx-swap="outerHTML transition:true"
                    @click="loading = true"
                    @htmx:after-request="loading = false"
                    class="bg-blue-600 hover:bg-blue-500 text-sm font-semibold py-2 px-4 rounded-lg flex items-center gap-2 transition-all active:scale-95"
            >
                <span x-show="loading" class="animate-spin text-xs">🌀</span>
                <span x-text="loading ? '刷新中...' : '手动刷新'"></span>
            </button>
        </div>
    </div>

    <div id="market-data-container"
         th:fragment="stock-table"
         hx-get="/market"
         hx-trigger="every 5s"
         hx-target="this"
         hx-swap="outerHTML transition:true"
         class="p-6">

        <div class="flex justify-between items-center mb-6 text-xs text-gray-400 border-b pb-4">
            <div class="flex items-center gap-1">
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span>轮询已开启 (5s)</span>
            </div>
            <div class="flex gap-1 items-baseline">
                <span>最后更新:</span>
                <span class="text-gray-700 font-mono-numbers font-bold w-16 text-right"
                      th:text="${updateTime}">14:30:00</span>
            </div>
        </div>

        <div class="space-y-3">
            <div th:each="stock : ${stocks}"
                 class="group flex justify-between items-center p-4 border border-gray-100 rounded-xl hover:border-blue-200 hover:bg-blue-50/30 transition-all duration-300">

                <div class="flex flex-col">
                    <span class="font-bold text-gray-800 text-base" th:text="${stock.name}">沪深300ETF</span>
                    <span class="text-xs text-gray-400 font-mono-numbers" th:text="${stock.code}">510300</span>
                </div>

                <div class="flex flex-col items-end">
                        <span class="text-xl font-bold font-mono-numbers tracking-tight"
                              th:classappend="${stock.isUp} ? 'text-red-500' : 'text-green-600'"
                              th:text="${stock.price}">3.586</span>

                    <div class="flex items-center gap-1 mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded-md font-medium"
                                  th:classappend="${stock.isUp} ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'"
                                  th:text="${stock.isUp ? '▲ 赚麻了' : '▼ 抄底了'}">
                            </span>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-6 text-[10px] text-center text-gray-300 italic">
            Data provided by noob-mini native service
        </p>
    </div>
</div>

</body>
</html>
