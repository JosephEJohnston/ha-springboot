<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>我的自选看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 p-8">

<div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">

  <div class="px-6 py-4 bg-gray-800 flex justify-between items-center text-white">
    <h1 class="text-xl font-bold">📈 核心宽基自选池</h1>

    <div x-data="{ loading: false }">
      <button
              hx-get="/market"
              hx-target="#market-data-container"
              hx-swap="innerHTML"
              @click="loading = true"
              @htmx:after-request="loading = false"
              class="bg-blue-600 hover:bg-blue-500 text-sm font-semibold py-2 px-4 rounded flex items-center gap-2 transition"
      >
        <span x-show="loading" class="animate-spin">⏳</span>
        <span x-text="loading ? '刷新中...' : '获取最新行情'"></span>
      </button>
    </div>
  </div>

  <div id="market-data-container" class="p-6">
    <div th:fragment="stock-table">

      <div class="text-sm text-gray-500 mb-4 flex items-center justify-between">
        <span>行情数据纯属虚构，不构成投资建议</span>
        <span>最后更新：<strong class="text-gray-800" th:text="${updateTime}">10:00:00</strong></span>
      </div>

      <div class="grid gap-4">
        <div th:each="stock : ${stocks}"
             class="flex justify-between items-center p-4 border rounded-lg hover:bg-gray-50 transition">
          <div>
            <div class="font-bold text-gray-800 text-lg" th:text="${stock.name}">ETF名称</div>
            <div class="text-sm text-gray-400" th:text="${stock.code}">代码</div>
          </div>

          <div class="text-right">
            <div class="font-bold text-xl"
                 th:classappend="${stock.isUp} ? 'text-red-500' : 'text-green-500'"
                 th:text="${stock.price}">
              1.000
            </div>
            <div class="text-sm"
                 th:classappend="${stock.isUp} ? 'text-red-500' : 'text-green-500'"
                 th:text="${stock.isUp ? '+ 赚麻了' : '- 抄底了'}">
              状态
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
